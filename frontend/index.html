<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Myzone - Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">Myzone</h1>
                <div class="header-actions">
                    <button class="settings-btn" id="settingsBtn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="12" cy="12" r="1"></circle>
                            <circle cx="19" cy="12" r="1"></circle>
                            <circle cx="5" cy="12" r="1"></circle>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Profile Card -->
            <section class="profile-card">
                <div class="profile-header">
                    <img id="profilePic" src="" alt="Profile" class="profile-pic">
                    <div class="profile-info">
                        <h2 id="userName">Loading...</h2>
                        <p id="userHandle" class="username">@loading</p>
                    </div>
                </div>
                <div class="profile-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="coinBalance">0</div>
                        <div class="stat-label">Coins</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="storageUsed">0GB</div>
                        <div class="stat-label">Storage</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="level">1</div>
                        <div class="stat-label">Level</div>
                    </div>
                </div>
            </section>

            <!-- Quick Actions -->
            <section class="quick-actions">
                <button class="action-btn" id="vaultBtn">
                    <div class="btn-icon">🔐</div>
                    <div class="btn-text">Vault</div>
                </button>
                <button class="action-btn" id="gamesBtn">
                    <div class="btn-icon">🎮</div>
                    <div class="btn-text">Games</div>
                </button>
                <button class="action-btn" id="friendsBtn">
                    <div class="btn-icon">👥</div>
                    <div class="btn-text">Friends</div>
                </button>
                <button class="action-btn" id="adminBtn" style="display: none;">
                    <div class="btn-icon">⚙️</div>
                    <div class="btn-text">Admin</div>
                </button>
            </section>

            <!-- Recent Activity -->
            <section class="activity-section">
                <h3>Recent Activity</h3>
                <div id="activityList" class="activity-list">
                    <p class="empty-state">No recent activity</p>
                </div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-page="dashboard">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
            </button>
            <button class="nav-item" data-page="vault">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                    <path d="M16 5V3a1 1 0 0 0-1-1h-2a1 1 0 0 0-1 1v2"></path>
                </svg>
            </button>
            <button class="nav-item" data-page="games">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <line x1="6" y1="9" x2="6" y2="20"></line>
                    <line x1="10" y1="9" x2="10" y2="20"></line>
                    <line x1="14" y1="9" x2="14" y2="20"></line>
                    <line x1="18" y1="9" x2="18" y2="20"></line>
                    <path d="M4 9h16V7a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2Z"></path>
                </svg>
            </button>
            <button class="nav-item" data-page="profile">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </button>
        </nav>
    </div>

    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-screen">
        <div class="spinner"></div>
        <p>Loading Myzone...</p>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">&times;</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="js/telegram.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/vault.js"></script>
    <script src="js/games.js"></script>
</body>
</html>
