<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Myzone - Games</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <button class="back-btn" id="backBtn">←</button>
            <h1>Games</h1>
            <div style="width: 40px;"></div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Games Grid -->
            <section class="games-grid">
                <div class="game-card" id="snakeGame">
                    <div class="game-icon">🐍</div>
                    <h3>Snake</h3>
                    <p>Classic snake game</p>
                    <div class="game-stats">
                        <span id="snakeHighScore">High: 0</span>
                    </div>
                </div>

                <div class="game-card" id="ludoGame">
                    <div class="game-icon">🎲</div>
                    <h3>Ludo</h3>
                    <p>Multiplayer game</p>
                    <div class="game-stats">
                        <span id="ludoWins">Wins: 0</span>
                    </div>
                </div>
            </section>

            <!-- Leaderboard -->
            <section class="leaderboard-section">
                <h3>Leaderboard</h3>
                <div class="leaderboard-tabs">
                    <button class="tab-btn active" data-game="snake">Snake</button>
                    <button class="tab-btn" data-game="ludo">Ludo</button>
                </div>
                <div id="leaderboard" class="leaderboard-list">
                    <p class="empty-state">Loading...</p>
                </div>
            </section>

            <!-- Friends Gaming Section -->
            <section class="friends-gaming">
                <h3>Play with Friends</h3>
                <div class="friend-actions">
                    <input type="text" id="roomCode" placeholder="Enter room code..." class="input">
                    <button class="btn-primary" id="joinRoomBtn">Join Room</button>
                    <button class="btn-secondary" id="createRoomBtn">Create Room</button>
                </div>
                <div id="roomInfo" class="room-info"></div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item" data-page="dashboard">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
            </button>
            <button class="nav-item" data-page="vault">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                    <path d="M16 5V3a1 1 0 0 0-1-1h-2a1 1 0 0 0-1 1v2"></path>
                </svg>
            </button>
            <button class="nav-item active" data-page="games">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <line x1="6" y1="9" x2="6" y2="20"></line>
                    <line x1="10" y1="9" x2="10" y2="20"></line>
                    <line x1="14" y1="9" x2="14" y2="20"></line>
                    <line x1="18" y1="9" x2="18" y2="20"></line>
                    <path d="M4 9h16V7a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2Z"></path>
                </svg>
            </button>
            <button class="nav-item" data-page="profile">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </button>
        </nav>
    </div>

    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-screen">
        <div class="spinner"></div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">&times;</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="js/telegram.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/games.js"></script>
</body>
</html>
